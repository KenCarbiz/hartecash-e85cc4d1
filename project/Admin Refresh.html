<style>
  :root {
    --ink: 220 20% 12%;
    --ink-soft: 220 10% 40%;
    --ink-faint: 220 8% 62%;
    --surface: 40 30% 98%;
    --surface-2: 40 20% 96%;
    --surface-3: 40 15% 93%;
    --hair: 220 15% 90%;
    --hair-soft: 220 15% 94%;
    --accent: 216 85% 48%;
    --accent-soft: 216 85% 94%;
    --success: 150 55% 40%;
    --success-soft: 150 55% 92%;
    --warn: 32 85% 48%;
    --warn-soft: 32 85% 94%;
    --danger: 4 72% 52%;
    --danger-soft: 4 72% 95%;
  }
  html, body { height: 100%; }
  body {
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    font-feature-settings: 'cv11','ss01','ss03';
    color: hsl(var(--ink));
    background: hsl(var(--surface));
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }
  .hair { border-color: hsl(var(--hair)); }
  .hair-soft { border-color: hsl(var(--hair-soft)); }
  .ink { color: hsl(var(--ink)); }
  .ink-soft { color: hsl(var(--ink-soft)); }
  .ink-faint { color: hsl(var(--ink-faint)); }
  .bg-surface { background: hsl(var(--surface)); }
  .bg-surface-2 { background: hsl(var(--surface-2)); }
  .bg-surface-3 { background: hsl(var(--surface-3)); }
  .accent-bg { background: hsl(var(--accent)); }
  .accent-text { color: hsl(var(--accent)); }
  .accent-soft-bg { background: hsl(var(--accent-soft)); }
  .success-text { color: hsl(var(--success)); }
  .success-bg { background: hsl(var(--success)); }
  .success-soft { background: hsl(var(--success-soft)); color: hsl(var(--success)); }
  .warn-text { color: hsl(var(--warn)); }
  .warn-soft { background: hsl(var(--warn-soft)); color: hsl(var(--warn)); }
  .danger-text { color: hsl(var(--danger)); }
  .danger-bg { background: hsl(var(--danger)); }
  .danger-soft { background: hsl(var(--danger-soft)); color: hsl(var(--danger)); }

  /* Old-style gradient header for kill-switch OFF mode */
  .legacy-header {
    background: linear-gradient(90deg, hsl(var(--accent)) 0%, hsl(216 85% 58%) 60%, hsl(216 85% 68%) 100%);
  }
  .legacy-grid::before {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(0,0,0,0.06) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }

  /* Arrived row pulse */
  @keyframes pulse-arrived {
    0%, 100% { box-shadow: inset 3px 0 0 hsl(var(--danger)); background: hsl(var(--danger-soft)); }
    50%      { box-shadow: inset 3px 0 0 hsl(var(--danger)); background: hsl(4 72% 90%); }
  }
  .arrived-row { animation: pulse-arrived 2s ease-in-out infinite; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }
  .pulse-dot { animation: pulse-dot 1.2s ease-in-out infinite; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; right: 16px; bottom: 16px; z-index: 60;
    width: 300px;
    background: hsl(var(--surface));
    border: 1px solid hsl(var(--hair));
    border-radius: 14px;
    box-shadow: 0 20px 40px -12px rgba(20,24,40,0.18), 0 0 0 1px rgba(0,0,0,0.02);
    overflow: hidden;
  }

  /* Remove scrollbar noise */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: hsl(var(--hair)); border-radius: 10px; border: 2px solid hsl(var(--surface)); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Focus-fill for interactive rows */
  .row-hover:hover { background: hsl(var(--surface-2)); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500;
    padding: 6px 10px; border-radius: 8px;
    border: 1px solid hsl(var(--hair)); background: hsl(var(--surface));
    transition: background 120ms, border-color 120ms, color 120ms;
    white-space: nowrap;
  }
  .btn:hover { background: hsl(var(--surface-2)); border-color: hsl(var(--ink-faint)); }
  .btn-primary { background: hsl(var(--ink)); color: white; border-color: hsl(var(--ink)); }
  .btn-primary:hover { background: hsl(220 20% 18%); }
  .btn-accent { background: hsl(var(--accent)); color: white; border-color: hsl(var(--accent)); }
  .btn-accent:hover { background: hsl(216 85% 42%); }
  .btn-danger { background: hsl(var(--danger)); color: white; border-color: hsl(var(--danger)); }
  .btn-danger:hover { background: hsl(4 72% 44%); }
  .btn-ghost { background: transparent; border-color: transparent; color: hsl(var(--ink-soft)); }
  .btn-ghost:hover { background: hsl(var(--surface-2)); color: hsl(var(--ink)); }

  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 999px;
    background: hsl(var(--surface-3)); color: hsl(var(--ink-soft));
    letter-spacing: 0.01em;
  }

  .kbd {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10px; padding: 1px 5px;
    border: 1px solid hsl(var(--hair));
    border-bottom-width: 2px;
    border-radius: 4px;
    background: hsl(var(--surface));
    color: hsl(var(--ink-soft));
  }

  .row-action-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500;
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid hsl(var(--hair));
    background: hsl(var(--surface));
    color: hsl(var(--ink));
    white-space: nowrap;
  }
  .row-action-btn:hover { background: hsl(var(--surface-2)); border-color: hsl(var(--ink-faint)); }
  .row-action-btn-primary { background: hsl(var(--ink)); color: white; border-color: hsl(var(--ink)); }
  .row-action-btn-primary:hover { background: hsl(220 20% 18%); }
  .row-action-btn-danger { background: hsl(var(--danger)); color: white; border-color: hsl(var(--danger)); }
  .row-action-btn-accent { background: hsl(var(--accent)); color: white; border-color: hsl(var(--accent)); }

  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px; border-radius: 7px;
    font-size: 13px; color: hsl(var(--ink-soft));
    cursor: pointer;
    transition: background 100ms, color 100ms;
  }
  .sidebar-item:hover { background: hsl(var(--surface-2)); color: hsl(var(--ink)); }
  .sidebar-item.active {
    background: hsl(var(--ink));
    color: white;
  }
  .sidebar-item.active .sidebar-badge { background: rgba(255,255,255,0.2); color: white; }

  .sidebar-badge {
    margin-left: auto;
    font-size: 10px; font-weight: 600;
    padding: 1px 6px; border-radius: 999px;
    background: hsl(var(--surface-3));
    color: hsl(var(--ink-soft));
  }
  .sidebar-badge.danger { background: hsl(var(--danger-soft)); color: hsl(var(--danger)); }

  .sidebar-group {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: hsl(var(--ink-faint));
    padding: 14px 10px 6px;
  }

  /* Alert strip */
  .alert-strip {
    background: linear-gradient(90deg, hsl(var(--danger-soft)), hsl(var(--warn-soft)));
    border: 1px solid hsl(var(--danger)/0.3);
    border-left: 3px solid hsl(var(--danger));
  }

  /* Subtle card */
  .card {
    background: hsl(var(--surface));
    border: 1px solid hsl(var(--hair));
    border-radius: 12px;
  }
  .card-soft {
    background: hsl(var(--surface-2));
    border: 1px solid hsl(var(--hair-soft));
    border-radius: 12px;
  }

  [data-legacy="true"] .shell-new { display: none; }
  [data-legacy="false"] .shell-legacy { display: none; }
</style>

const Pill = ({ children, className = "" }) => (

);

const StatusPill = ({ status }) => {
  const m = STATUS_META[status] || { label: status, cls: "pill", dot: "bg-gray-400" };
  return (
    <span className={`inline-flex items-center gap-1.5 text-[11px] font-semibold px-2 py-0.5 rounded-full ${m.cls}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${m.dot} ${status === "arrived" ? "pulse-dot" : ""}`} />
      {m.label}
    </span>
  );
};

const formatAge = (h) => {
  if (h < 1) return `${Math.round(h * 60)}m`;
  if (h < 24) return `${Math.round(h)}h`;
  return `${Math.floor(h / 24)}d`;
};

const nextActionFor = (lead) => {
  if (lead.status === "arrived") return { label: "Greet now", variant: "danger", icon: Icon.arrow };
  if (lead.status === "on_way") return { label: "Prep file", variant: "primary", icon: Icon.arrow };
  if (lead.status === "accepted") return { label: "Book appt", variant: "primary", icon: Icon.calendar };
  if (lead.status === "inspected") return { label: "Make offer", variant: "accent", icon: Icon.dollar };
  if (lead.status === "contacted") return { label: "Follow up", variant: "ghost", icon: Icon.phone };
  if (lead.status === "new") return { label: "Call", variant: "primary", icon: Icon.phone };
  if (lead.status === "purchase_complete") return { label: "View", variant: "ghost", icon: null };
  if (lead.status === "dead") return { label: "Revive", variant: "ghost", icon: null };
  return { label: "Open", variant: "ghost", icon: null };

<script type="text/babel" data-presets="react">
/* ──────────────────────────────────────────
   ROOT APP
   ────────────────────────────────────────── */
function App() {
  const [state, setState] = useState(() => {
    try {
      const saved = localStorage.getItem("autocurb-refresh-tweaks");
      return saved ? { ...TWEAKS, ...JSON.parse(saved) } : TWEAKS;
    } catch { return TWEAKS; }
  });
  const [active, setActive] = useState(ROLES[state.role].home);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  const set = (key, val) => {
    setState(s => {
      const next = { ...s, [key]: val };
      localStorage.setItem("autocurb-refresh-tweaks", JSON.stringify(next));
      if (key === "role") setActive(ROLES[val].home);
      // Also post to parent for persistence via edit mode
      try {
        window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: val } }, "*");
      } catch {}
      return next;
    });
  };

  // Edit-mode listener
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", handler);
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch {}
    return () => window.removeEventListener("message", handler);
  }, []);

  // Build the alert count for the header bell
  const alertCount = useMemo(() => {
    return [state.showArrivedBanner, state.showOnTheWay, state.showHotLead, state.showSlaBreach].filter(Boolean).length;
  }, [state]);

  const legacy = !state.killSwitch;

  // Pick the right home/page
  const renderContent = () => {
    if (legacy) return <LegacyLeadsTable />;
    if (active === "today") return <TodayHome role={state.role} setActive={setActive} />;
    if (active === "reception") return <ReceptionHome />;
    if (active === "bdc") return <BdcHome />;
    if (active === "appraiser") return <AppraiserHome />;
    if (active === "platform") return <PlatformHome />;
    if (active === "leads") return (
      <LeadsTable
        alertIntensity={state.alertIntensity}
        showArrivedBanner={state.showArrivedBanner}
        showHotLead={state.showHotLead}
        showSlaBreach={state.showSlaBreach}
        compact={state.compactTable}
      />
    );
    // Fallback: placeholder card for unmocked sections
    return (
      <div className="max-w-[900px] mx-auto px-6 py-16 text-center">
        <div className="card p-10">
          <div className="text-[13px] font-semibold mb-1">Section placeholder</div>
          <div className="text-[12px] ink-soft">Switch to Today, All Leads, or another mocked view.</div>
        </div>
      </div>
    );
  };

  return (
    <div data-legacy={legacy} className="min-h-screen flex flex-col">
      {legacy ? (
        <>
          <LegacyHeader role={state.role} setRole={(r) => set("role", r)} />
          <div className="flex-1 flex min-h-0">
            <LegacySidebar role={state.role} active={active} setActive={setActive} />
            <main className="flex-1 min-w-0 overflow-auto bg-gray-50">
              {renderContent()}
            </main>
          </div>
        </>
      ) : (
        <>
          <AppHeader role={state.role} setRole={(r) => set("role", r)} setActive={setActive} alertCount={alertCount} />
          <div className="flex-1 flex min-h-0">
            <Sidebar role={state.role} active={active} setActive={setActive} />
            <main className="flex-1 min-w-0 overflow-auto">
              {renderContent()}
            </main>
          </div>
        </>
      )}

      <TweaksPanel state={state} set={set} open={tweaksOpen} setOpen={setTweaksOpen} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
