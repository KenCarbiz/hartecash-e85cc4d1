<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCurb — Customer Self Check-In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: {
        sans: ['Inter','system-ui','sans-serif'],
        display: ['"DM Serif Display"','Georgia','serif'],
      },
    }}};
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'DM Serif Display', Georgia, serif; }
    @keyframes pulse-ring {
      0%   { transform: scale(0.95); opacity: 0.7; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeInUp 500ms ease-out backwards; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="mock-data.js"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    /**
     * Customer Self Check-In Page (magic link)
     * ────────────────────────────────────────
     * Lives at `autocurb.io/a/{token}`. The token is generated when
     * the appointment is booked and included in EVERY touchpoint the
     * customer already receives:
     *   - Appointment confirmation SMS
     *   - Appointment confirmation email
     *   - Day-of reminder SMS (sent 2h before appt)
     *   - Apple/Google Wallet pass
     *
     * The customer taps the link once and lands here. No account, no
     * login — the token IS the auth.
     *
     * Three states the customer can be in:
     *   A · BEFORE   — two big buttons: "On my way" + "I'm here"
     *   B · ON WAY   — they said they're coming, shows ETA + a
     *                   second "I'm here" button for when they arrive
     *   C · ARRIVED  — confirmed on-lot, who's coming to meet them
     *
     * When the customer taps either button, the server:
     *   1. Flips their row status in the admin pipeline
     *      (Appointment Today → On the Way → Customer Arrived)
     *   2. Sends an SMS to the assigned sales manager AND salesperson
     *      AND assigned appraiser (if one is set)
     *   3. Posts an in-app toast + increments the bell-badge count
     *
     * This page is OFFLINE-SAFE: the "I'm here" button is the last
     * thing the customer taps as they pull onto the lot, possibly
     * with bad cell service. Buttons use optimistic UI + retry.
     */

    function Hero({ stage, firstName }) {
      if (stage === "before") {
        return (
          <>
            <div className="text-[13px] font-semibold text-blue-700 tracking-widest uppercase mb-2">
              Hi, {firstName}
            </div>
            <h1 className="font-display text-[32px] leading-[1.05] text-slate-900">
              On your way to Hartford&nbsp;Toyota?
            </h1>
            <p className="text-[14px] text-slate-500 mt-2 max-w-[300px] mx-auto">
              Tap below so we can have everything ready for you.
            </p>
          </>
        );
      }
      if (stage === "onway") {
        return (
          <>
            <div className="inline-flex items-center gap-1.5 text-[12px] font-bold text-blue-700 tracking-wider uppercase mb-2 bg-blue-100 rounded-full px-2.5 py-1">
              <span className="relative flex h-1.5 w-1.5">
                <span className="absolute inline-flex h-full w-full rounded-full bg-blue-500 opacity-75 animate-ping" />
                <span className="relative inline-flex h-1.5 w-1.5 rounded-full bg-blue-600" />
              </span>
              We know you're coming
            </div>
            <h1 className="font-display text-[30px] leading-[1.1] text-slate-900">
              See you soon, {firstName}
            </h1>
            <p className="text-[14px] text-slate-500 mt-2 max-w-[300px] mx-auto">
              Ken's been notified. Tap "I'm here" when you pull onto the lot.
            </p>
          </>
        );
      }
      return (
        <>
          <h1 className="font-display text-[32px] leading-[1.05] text-slate-900">You're checked in</h1>
          <p className="text-[15px] text-slate-500 mt-2 max-w-[280px] mx-auto">
            Ken has been notified and is heading out to meet you.
          </p>
        </>
      );
    }

    function CheckInPage({ stage, setStage, sub }) {
      const firstName = sub.name.split(" ")[0];

      const bgClass =
        stage === "arrived" ? "from-emerald-50 to-white" :
        stage === "onway"   ? "from-blue-50 to-white" :
                              "from-white via-white to-slate-50";

      const IconOnTheWay = () => (
        <svg className="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 3h7v7M10 14L21 3M21 14v5a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h5"/></svg>
      );
      const IconImHere = () => (
        <svg className="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      );

      return (
        <div className={`min-h-full bg-gradient-to-b ${bgClass}`}>
          {/* Dealership brand row */}
          <div className="pt-20 pb-3 px-6 text-center">
            <div className="inline-flex items-center gap-2 text-[11px] font-semibold text-slate-500 tracking-widest uppercase">
              <div className="w-5 h-5 rounded bg-gradient-to-br from-[#003b80] to-[#005bb5] text-white text-[9px] font-bold flex items-center justify-center">HT</div>
              Hartford Toyota
            </div>
          </div>

          {/* Hero text or arrived big check */}
          {stage === "arrived" ? (
            <div className="pt-8 pb-6 px-6 flex flex-col items-center text-center">
              <div className="relative w-24 h-24 mb-5">
                <div className="absolute inset-0 rounded-full bg-emerald-500/20 pulse-ring" />
                <div className="absolute inset-2 rounded-full bg-emerald-500/30 pulse-ring" style={{ animationDelay: "0.5s" }} />
                <div className="relative w-24 h-24 rounded-full bg-gradient-to-br from-emerald-500 to-emerald-600 flex items-center justify-center shadow-lg shadow-emerald-500/40">
                  <svg className="w-12 h-12 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                </div>
              </div>
              <Hero stage="arrived" firstName={firstName} />
            </div>
          ) : (
            <div className="pt-6 pb-6 px-6 text-center fade-up">
              <Hero stage={stage} firstName={firstName} />
            </div>
          )}

          {/* Appointment card — always visible */}
          <div className="px-4 fade-up" style={{ animationDelay: "120ms" }}>
            <div className="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
              <div className="flex items-center gap-3 mb-3">
                <div className="w-12 h-12 rounded-xl bg-slate-100 flex items-center justify-center">
                  <svg className="w-7 h-7 text-slate-500" viewBox="0 0 24 24" fill="currentColor"><path d="M5 11l1.5-4.5A2 2 0 018.4 5h7.2a2 2 0 011.9 1.5L19 11m-14 0h14m-14 0a2 2 0 00-2 2v4a2 2 0 002 2h1a2 2 0 002-2v-1h8v1a2 2 0 002 2h1a2 2 0 002-2v-4a2 2 0 00-2-2M7 15h.01M17 15h.01"/></svg>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-[11px] uppercase tracking-wider text-slate-400 font-semibold">Your Vehicle</div>
                  <div className="text-[15px] font-bold text-slate-900 leading-tight">{sub.vehicle_year} {sub.vehicle_make} {sub.vehicle_model}</div>
                  <div className="text-[12px] text-slate-500 mt-0.5">{sub.plate} · …{sub.vin.slice(-6)}</div>
                </div>
              </div>
              <div className="border-t border-slate-100 pt-3 flex items-center justify-between">
                <div>
                  <div className="text-[11px] uppercase tracking-wider text-slate-400 font-semibold">Appointment</div>
                  <div className="text-[14px] font-semibold text-slate-900">Today · 10:00 AM</div>
                </div>
                <div className="text-right">
                  <div className="text-[11px] uppercase tracking-wider text-slate-400 font-semibold">With</div>
                  <div className="text-[14px] font-semibold text-slate-900">Ken Carbiz</div>
                </div>
              </div>
            </div>
          </div>

          {/* Primary action block — changes per stage */}
          <div className="px-4 mt-5 fade-up" style={{ animationDelay: "180ms" }}>
            {stage === "before" && (
              <div className="space-y-3">
                <button
                  onClick={() => setStage("onway")}
                  className="relative w-full h-16 rounded-2xl bg-white border-2 border-blue-500 text-blue-700 font-bold text-[18px] hover:bg-blue-50 active:scale-[0.99] transition flex items-center justify-center gap-2.5"
                >
                  <IconOnTheWay />
                  I'm on my way
                </button>
                <button
                  onClick={() => setStage("arrived")}
                  className="relative w-full h-[72px] rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-600 text-white font-bold text-[20px] shadow-lg shadow-emerald-500/30 active:scale-[0.98] transition overflow-hidden flex items-center justify-center gap-2.5"
                >
                  <IconImHere />
                  I'm here
                  <span className="absolute inset-0 bg-[linear-gradient(135deg,transparent_40%,rgba(255,255,255,0.2)_50%,transparent_60%)]" />
                </button>
                <div className="text-center text-[11.5px] text-slate-400 pt-1">
                  Ken will get a text the moment you tap.
                </div>
              </div>
            )}

            {stage === "onway" && (
              <div className="space-y-3">
                <div className="rounded-2xl bg-white border border-blue-200 px-4 py-3.5 flex items-center gap-3">
                  <div className="w-9 h-9 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center shrink-0">
                    <svg className="w-4.5 h-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-[13px] font-bold text-slate-900">We let Ken know</div>
                    <div className="text-[12px] text-slate-500">Sent 30 seconds ago · ETA ~12 min</div>
                  </div>
                </div>
                <button
                  onClick={() => setStage("arrived")}
                  className="relative w-full h-[72px] rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-600 text-white font-bold text-[20px] shadow-lg shadow-emerald-500/30 active:scale-[0.98] transition overflow-hidden flex items-center justify-center gap-2.5"
                >
                  <IconImHere />
                  I'm here now
                  <span className="absolute inset-0 bg-[linear-gradient(135deg,transparent_40%,rgba(255,255,255,0.2)_50%,transparent_60%)]" />
                </button>
                <div className="text-center text-[11.5px] text-slate-400 pt-1">
                  Tap this when you pull onto the lot.
                </div>
              </div>
            )}

            {stage === "arrived" && (
              <div className="rounded-2xl bg-white border border-slate-200 shadow-sm overflow-hidden">
                <div className="px-4 py-3 bg-slate-900 text-white flex items-center gap-2">
                  <span className="relative flex h-2 w-2">
                    <span className="absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75 animate-ping" />
                    <span className="relative inline-flex h-2 w-2 rounded-full bg-emerald-500" />
                  </span>
                  <span className="text-[11px] uppercase tracking-wider font-bold">Live</span>
                  <span className="flex-1" />
                  <span className="text-[12px] text-white/70">Updated just now</span>
                </div>
                <div className="p-4 space-y-4">
                  <div className="flex items-start gap-3">
                    <div className="w-10 h-10 rounded-full bg-blue-500 text-white font-bold text-[13px] flex items-center justify-center shrink-0">KC</div>
                    <div className="flex-1 min-w-0">
                      <div className="text-[14px] font-bold text-slate-900">Ken Carbiz</div>
                      <div className="text-[12px] text-slate-500">Your sales manager</div>
                      <div className="mt-2 flex items-center gap-1.5 text-[12px] font-semibold text-emerald-700">
                        <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        On the way · ~2 min
                      </div>
                    </div>
                    <a href="tel:+18605550123" className="w-10 h-10 rounded-xl bg-emerald-500 text-white flex items-center justify-center shrink-0 shadow shadow-emerald-500/30 active:scale-95 transition">
                      <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.8 19.8 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.8 19.8 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.8 12.8 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.8 12.8 0 002.81.7A2 2 0 0122 16.92z"/></svg>
                    </a>
                  </div>
                  <div className="border-t border-slate-100 pt-3">
                    <div className="rounded-xl bg-amber-50 border border-amber-200 px-3.5 py-3 flex items-start gap-2.5">
                      <svg className="w-5 h-5 text-amber-600 shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="10" r="3"/><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/></svg>
                      <div className="flex-1">
                        <div className="text-[13.5px] font-bold text-amber-900 leading-snug">Stay in your car — Ken is walking out now.</div>
                        <div className="text-[12px] text-amber-800 mt-0.5">Pull up to the service drive or park in any visitor spot.</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Quick-action rows: directions + call — shown on before/onway */}
          {stage !== "arrived" && (
            <div className="px-4 mt-6 fade-up" style={{ animationDelay: "260ms" }}>
              <div className="text-[11px] uppercase tracking-wider font-semibold text-slate-400 px-2 mb-2">Getting here</div>
              <div className="bg-white rounded-2xl border border-slate-200 divide-y divide-slate-100">
                <a href="https://maps.apple.com/?q=Hartford+Toyota" className="w-full px-4 py-3.5 flex items-center gap-3 hover:bg-slate-50 active:bg-slate-100 transition">
                  <svg className="w-5 h-5 text-blue-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="10" r="3"/><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/></svg>
                  <div className="flex-1">
                    <div className="text-[14px] font-semibold text-slate-900">Directions</div>
                    <div className="text-[12px] text-slate-500">45 Albany Tpke, Hartford CT</div>
                  </div>
                  <svg className="w-4 h-4 text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </a>
                <a href="tel:+18605550123" className="w-full px-4 py-3.5 flex items-center gap-3 hover:bg-slate-50 active:bg-slate-100 transition">
                  <svg className="w-5 h-5 text-blue-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.8 19.8 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.8 19.8 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.8 12.8 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.8 12.8 0 002.81.7A2 2 0 0122 16.92z"/></svg>
                  <div className="flex-1">
                    <div className="text-[14px] font-semibold text-slate-900">Call the dealership</div>
                    <div className="text-[12px] text-slate-500">(860) 555‑0123</div>
                  </div>
                  <svg className="w-4 h-4 text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </a>
                <a href="sms:+18605550123" className="w-full px-4 py-3.5 flex items-center gap-3 hover:bg-slate-50 active:bg-slate-100 transition">
                  <svg className="w-5 h-5 text-blue-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                  <div className="flex-1">
                    <div className="text-[14px] font-semibold text-slate-900">Text us</div>
                    <div className="text-[12px] text-slate-500">Running late? Let us know</div>
                  </div>
                  <svg className="w-4 h-4 text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </a>
              </div>
            </div>
          )}

          {/* What happens next — only on arrived */}
          {stage === "arrived" && (
            <div className="px-4 mt-6">
              <div className="text-[11px] uppercase tracking-wider font-semibold text-slate-400 px-2 mb-2">What happens next</div>
              <div className="bg-white rounded-2xl border border-slate-200 p-4 space-y-3">
                {[
                  { n: "1", title: "Ken greets you", body: "Walks out to your car with a tablet.", active: true },
                  { n: "2", title: "Quick 5-min walkaround", body: "Photos of the car, check the VIN." },
                  { n: "3", title: "Final offer in-hand", body: "If everything matches, we firm up the number." },
                ].map((step, i) => (
                  <div key={i} className="flex gap-3">
                    <div className={`w-7 h-7 rounded-full flex items-center justify-center text-[12px] font-bold shrink-0 ${step.active ? "bg-emerald-500 text-white" : "bg-slate-100 text-slate-400"}`}>
                      {step.n}
                    </div>
                    <div className="flex-1 pt-0.5">
                      <div className={`text-[14px] font-semibold ${step.active ? "text-slate-900" : "text-slate-500"}`}>{step.title}</div>
                      <div className={`text-[12px] mt-0.5 ${step.active ? "text-slate-600" : "text-slate-400"}`}>{step.body}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="px-6 pt-8 pb-24 text-center fade-up" style={{ animationDelay: "360ms" }}>
            <div className="text-[10.5px] text-slate-400">
              Powered by AutoCurb · <span className="underline">Privacy</span>
            </div>
          </div>
        </div>
      );
    }

    function DeviceLabel({ caption, sub, children }) {
      return (
        <div className="flex flex-col items-center gap-3">
          <div className="text-[12px] uppercase tracking-widest text-slate-500 font-bold text-center">{caption}</div>
          {sub && <div className="text-[11px] text-slate-400 text-center max-w-[260px] -mt-2">{sub}</div>}
          {children}
        </div>
      );
    }

    function App() {
      const sub = window.MOCK_SUBMISSIONS.find(s => s.id === "sub_004");
      const [stage, setStage] = useState("before");

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 via-slate-100 to-slate-200 px-8 py-16">
          <div className="max-w-[1500px] mx-auto">
            <div className="text-center mb-10">
              <div className="inline-flex items-center gap-2 text-[11px] uppercase tracking-widest font-bold text-slate-400 mb-3">
                <div className="w-6 h-6 rounded-md bg-gradient-to-br from-[#003b80] to-[#005bb5] text-white text-[10px] font-bold flex items-center justify-center">AC</div>
                AutoCurb
              </div>
              <h1 className="font-display text-[36px] text-slate-900 leading-tight">Customer Self Check-In</h1>
              <p className="text-[14px] text-slate-500 mt-3 max-w-[640px] mx-auto">
                The magic link we bake into every appointment confirmation SMS & email.
                Customer taps it from anywhere — driveway, highway, parking lot — and
                sales manager + salesperson + appraiser get SMS'd + an in-app alert.
                <br/><span className="text-[12px] text-slate-400">Lives at autocurb.io/a/{"{token}"}</span>
              </p>
            </div>

            {/* 3 states side-by-side */}
            <div className="flex flex-wrap justify-center gap-x-10 gap-y-14 mb-12">
              <DeviceLabel caption="A · Before" sub="The SMS link opens to this. Two buttons — they pick.">
                <window.IOSDevice width={380} height={820}>
                  <CheckInPage stage="before" sub={sub} setStage={() => {}} />
                </window.IOSDevice>
              </DeviceLabel>
              <DeviceLabel caption="B · On the way" sub="Reassurance + a one-tap 'I'm here' for when they arrive.">
                <window.IOSDevice width={380} height={820}>
                  <CheckInPage stage="onway" sub={sub} setStage={() => {}} />
                </window.IOSDevice>
              </DeviceLabel>
              <DeviceLabel caption="C · Arrived" sub="Who's coming, where to go, what happens next.">
                <window.IOSDevice width={380} height={820}>
                  <CheckInPage stage="arrived" sub={sub} setStage={() => {}} />
                </window.IOSDevice>
              </DeviceLabel>
            </div>

            {/* Live interactive */}
            <div className="max-w-[420px] mx-auto">
              <div className="text-center text-[11px] uppercase tracking-widest font-bold text-slate-400 mb-3">
                Interactive · tap the buttons
              </div>
              <window.IOSDevice width={380} height={820}>
                <CheckInPage stage={stage} setStage={setStage} sub={sub} />
              </window.IOSDevice>
              <div className="text-center mt-4">
