<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes spin-wheel {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .wheel {
        transform-origin: center;
        animation: spin-wheel 1s linear infinite;
      }
    </style>
  </defs>
  
  <!-- Car body . -->
  <rect x="120" y="140" width="160" height="80" rx="15" fill="#E8F0FE" stroke="#1E40AF" stroke-width="2"/>
  
  <!-- Car top -->
  <ellipse cx="180" cy="130" rx="50" ry="35" fill="#E8F0FE" stroke="#1E40AF" stroke-width="2"/>
  
  <!-- Window -->
  <rect x="145" y="105" width="70" height="35" rx="5" fill="#D4E4F7" stroke="#1E40AF" stroke-width="1.5"/>
  
  <!-- Front bumper detail -->
  <rect x="270" y="155" width="20" height="50" fill="#FBBF24" opacity="0.7"/>
  
  <!-- Left wheel -->
  <g class="wheel" style="animation-delay: 0s">
    <circle cx="155" cy="225" r="20" fill="none" stroke="#1E40AF" stroke-width="2"/>
    <circle cx="155" cy="225" r="12" fill="none" stroke="#1E40AF" stroke-width="1"/>
    <line x1="155" y1="213" x2="155" y2="237" stroke="#1E40AF" stroke-width="1"/>
    <line x1="143" y1="225" x2="167" y2="225" stroke="#1E40AF" stroke-width="1"/>
  </g>
  
  <!-- Right wheel -->
  <g class="wheel" style="animation-delay: 0s">
    <circle cx="245" cy="225" r="20" fill="none" stroke="#1E40AF" stroke-width="2"/>
    <circle cx="245" cy="225" r="12" fill="none" stroke="#1E40AF" stroke-width="1"/>
    <line x1="245" y1="213" x2="245" y2="237" stroke="#1E40AF" stroke-width="1"/>
    <line x1="233" y1="225" x2="257" y2="225" stroke="#1E40AF" stroke-width="1"/>
  </g>
  
  <!-- Speed lines -->
  <line x1="300" y1="160" x2="330" y2="160" stroke="#EF4444" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="310" y1="180" x2="345" y2="180" stroke="#EF4444" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>